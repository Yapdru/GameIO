<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GameIO Stable</title>
<style>
:root{--bg:#07091f;--p:#111a44;--c:#36e9ff;--m:#ff3ca6;--y:#ffd84d;--g:#72ff91}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:white;font-family:monospace;font-weight:bold;overflow:hidden}.screen{display:none;min-height:100vh;padding:18px;background:radial-gradient(circle at 20% 0,#15386b,transparent 35%),radial-gradient(circle at 90% 0,#4b1646,transparent 32%),var(--bg);overflow:auto}.on{display:block}.card{max-width:900px;margin:22px auto;padding:20px;border:4px solid var(--c);border-radius:24px;background:var(--p);text-align:center;animation:pop .25s}.logo{font-size:70px;color:var(--m);text-shadow:4px 4px #000;animation:pulse 1.3s infinite}.btn{padding:13px 17px;margin:7px;border:3px solid var(--c);border-radius:14px;background:var(--y);color:#061020;font:inherit;box-shadow:4px 4px #000;cursor:pointer}.pink{background:var(--m);color:white}.blue{background:var(--c)}.green{background:var(--g)}.dark{background:#1b2762;color:white}.tile,.player{border:3px solid var(--c);border-radius:16px;background:#17245c;padding:13px;margin:8px;animation:bob 2s infinite}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}.avatar{font-size:72px;animation:float 1.4s infinite}.code{font-size:54px;color:var(--y);letter-spacing:4px;animation:glow 1.5s infinite;user-select:all}input,select{padding:12px;border:3px solid var(--c);border-radius:12px;background:#060b22;color:white;font:inherit;margin:6px;max-width:420px;width:90%}.players{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px}.arena{height:300px;border:4px dashed var(--c);border-radius:18px;background:#101b4b;position:relative;overflow:hidden}.dot{position:absolute;font-size:32px;transition:.2s;animation:float 1.2s infinite;text-align:center}.dot small{display:block;font-size:10px;color:var(--y)}.prompt{border:3px dashed var(--c);border-radius:15px;padding:14px;margin:12px;font-size:21px}.blast{position:absolute;font-size:42px;animation:boom .55s forwards}.win{box-shadow:0 0 25px var(--y);border-color:var(--y)}.toast{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);background:#000;border:2px solid var(--c);color:var(--y);border-radius:12px;padding:10px;display:none;z-index:99}.chatBtn{position:fixed;right:12px;bottom:12px;z-index:5}.chat{position:fixed;right:-340px;top:0;width:min(340px,92vw);height:100vh;background:#0d1438;border-left:4px solid var(--c);padding:12px;transition:.25s;z-index:4;display:flex;flex-direction:column}.chat.open{right:0}.msgs{flex:1;overflow:auto;border:2px solid var(--c);padding:8px}.msg{background:#1b2762;margin:6px;padding:7px;border-radius:9px}.panel{height:90px;border:3px solid var(--g);border-radius:14px;display:grid;place-items:center;color:var(--g)}@keyframes pop{from{opacity:0;transform:scale(.96)}}@keyframes pulse{50%{transform:scale(1.05)}}@keyframes bob{50%{transform:translateY(-7px)}}@keyframes float{50%{transform:translateY(-6px) rotate(-2deg)}}@keyframes glow{50%{text-shadow:0 0 22px var(--y)}}@keyframes boom{to{transform:scale(2);opacity:0}}
</style>
<body>
<div id="toast" class="toast"></div><button class="btn pink chatBtn" onclick="G.chat()">Chat+</button>
<div id="chat" class="chat"><h2>Chat+ 💬</h2><p><button class="btn blue" onclick="G.flag('cam')">📹</button><button class="btn green" onclick="G.flag('mic')">🎤</button><button class="btn" onclick="G.emoji()">😀</button><button class="btn dark" onclick="G.chat()">X</button></p><div id="panel" class="panel">safe video/mic emoji panel</div><div id="msgs" class="msgs"></div><input id="ct" placeholder="chat"><button class="btn green" onclick="G.send()">Send</button></div>
<section id="home" class="screen on"><div class="card"><div class="logo">GAME IO</div><p id="server">Stable build ready</p><button class="btn pink" onclick="G.show('menu')">PRESS START</button></div></section>
<section id="menu" class="screen"><div class="card"><h1>Menu</h1><div class="grid"><button class="tile" onclick="G.quick()">J⚡ Quick Fishana</button><button class="tile" onclick="G.show('avatar')">C⚡ Create</button><button class="tile" onclick="G.show('join')">CJ Join</button></div></div></section>
<section id="avatar" class="screen"><div class="card"><h1>Avatar</h1><div id="av" class="avatar">😎🧥⚡</div><input id="name" placeholder="Your name"><p><button class="btn" onclick="G.pick('face','😎')">😎</button><button class="btn" onclick="G.pick('face','🐟')">🐟</button><button class="btn" onclick="G.pick('face','🦖')">🦖</button><button class="btn" onclick="G.pick('face','🤖')">🤖</button></p><p><button class="btn" onclick="G.pick('body','👕')">👕</button><button class="btn" onclick="G.pick('body','🧥')">🧥</button><button class="btn" onclick="G.pick('acc','👑')">👑</button><button class="btn" onclick="G.pick('acc','🎧')">🎧</button></p><button class="btn green" onclick="G.save()">SAVE</button><button class="btn blue" onclick="G.show('create')">NEXT</button></div></section>
<section id="create" class="screen"><div class="card"><h1>Create Room</h1><select id="game"></select><select id="rounds"><option>3<option selected>5<option>7</select><br><button class="btn pink" onclick="G.create()">CREATE CODE</button></div></section>
<section id="join" class="screen"><div class="card"><h1>Join</h1><input id="jc" placeholder="FISH-A7" style="text-transform:uppercase"><input id="jn" placeholder="name"><button class="btn blue" onclick="G.join()">JOIN</button></div></section>
<section id="lobby" class="screen"><div class="card"><h1>Lobby</h1><div id="room" class="code">----</div><p id="info"></p><div id="players" class="players"></div><button class="btn green" onclick="G.start()">START GAME</button><button class="btn blue" onclick="G.bot()">ADD BOT</button></div></section>
<section id="play" class="screen"><div class="card"><h1 id="title"></h1><p id="rs"></p><div id="arena" class="arena"></div><div id="prompt" class="prompt"></div><div id="answers"></div><button class="btn dark" onclick="G.finish()">FINISH</button></div></section>
<section id="results" class="screen"><div class="card"><h1>🏆 Winner Chart</h1><div id="board"></div><h2 id="slogan"></h2><button class="btn green" onclick="G.show('lobby')">REMATCH</button><button class="btn blue" onclick="G.show('menu')">MENU</button></div></section>
<script>
const G=(()=>{const DB='https://gameio-7e343-default-rtdb.firebaseio.com',games={fishana:'🎣 Fishana',npat:'📝 Name Place Animal Thing',charades:'🎭 Charades',cars:'🏎 Cars',badamsat:'🥜 Badamsat',bluff:'🃏 Bluff',funnyai:'😂 Funny AI',facetalk:'🗣 FaceTalk'},pre={fishana:['FISH','FIN','BUB'],npat:['NPAT','WORD'],charades:['CHAR','ACT'],cars:['CAR','RACE'],badamsat:['BADM','SAT'],bluff:['BLUF','CARD'],funnyai:['LOL','MEME'],facetalk:['FACE','TALK']},P={fishana:[['Triple Fishana 1: pearl found!',['Bubble Blast','Tail Spin','Hide','Mega Swim']],['Triple Fishana 2: evolve!',['Electric Fin','Shield','Ink','Bite']],['Triple Fishana 3: Shark King!',['Thunder','Bubble Net','Dash','Sing']]],npat:[['Letter D',['Dhruv Delhi Dog Drum','Dino Dubai Deer Door','Skip','Fish answer']]],charades:[['Act T-Rex in traffic',['Roar','Dance','Skip','Freeze']]],cars:[['Green light!',['Turbo','Drift','Horn','Brake']]],badamsat:[['Badamsat move',['Safe card','Risk card','Pass','Bluff face']]],bluff:[['Three kings?',['Believe','Call Bluff','Raise','Stare']]],funnyai:[['AI says normal',['Roast','Trust','Joke','Run']]],facetalk:[['Victory face',['😎','😂','😭','🐟']]]};let S={name:'Commander',face:'😎',body:'🧥',acc:'⚡',game:'fishana',rounds:5,r:1,score:0,room:'',players:[],cam:0,mic:0};const $=x=>document.getElementById(x),R=a=>a[Math.floor(Math.random()*a.length)];function show(x){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));$(x).classList.add('on')}function av(){return S.face+S.body+S.acc}function me(){return{name:S.name,av:av(),score:S.score,x:S.x||50,y:S.y||50,cam:S.cam,mic:S.mic}}async function api(p,m='GET',d){try{let o={method:m,headers:{'Content-Type':'application/json'}};if(d)o.body=JSON.stringify(d);let r=await fetch(DB+p+'.json',o);return r.ok?r.json():null}catch(e){return null}}function toast(t){toast.t&&clearTimeout(toast.t);$('toast').textContent=t;$('toast').style.display='block';toast.t=setTimeout(()=>$('toast').style.display='none',1600)}async function codeGen(g){let L='ABCDEFGHJKLMNPQRSTUVWXYZ',N='23456789';for(let i=0;i<20;i++){let c=R(pre[g])+'-'+R(L)+R(N);if(!await api('/rooms/'+c))return c}return'GAME-'+Date.now().toString(36).slice(-3).toUpperCase()}function lobby(){room.textContent=S.room;info.textContent=games[S.game]+' • '+S.rounds+' rounds';players.innerHTML=S.players.map((p,i)=>`<div class="player ${i==0?'win':''}"><div style="font-size:30px">${p.av}</div><div>${p.name} ${p.cam?'📹':''}${p.mic?'🎤':''}</div><div>${p.score||0} pts</div></div>`).join('')}function draw(){arena.innerHTML='';S.players.forEach(p=>{let d=document.createElement('div');d.className='dot';d.style.left=(p.x||50)+'%';d.style.top=(p.y||50)+'%';d.innerHTML=p.av+'<small>'+p.name+'</small>';arena.appendChild(d)})}function screen(){let item=P[S.game][(S.r-1)%P[S.game].length];title.textContent=games[S.game];rs.textContent='Round '+S.r+'/'+S.rounds+' • Score '+S.score;prompt.textContent=item[0];answers.innerHTML=item[1].map((x,i)=>`<button class="btn ${i?'blue':'pink'}" onclick="G.ans(${20-i*3})">${x}</button>`).join('');draw()}function boardIt(){S.players[0]=me();S.players.forEach((p,i)=>{if(i&&!p.score)p.score=Math.floor(20+Math.random()*100)});S.players.sort((a,b)=>(b.score||0)-(a.score||0));board.innerHTML=S.players.map((p,i)=>`<div class="player ${i==0?'win':''}">${['🥇','🥈','🥉','🎖️'][i]||'⭐'} ${p.av} ${p.name} — ${p.score||0}</div>`).join('');slogan.textContent=R(['TRIPLE FISHANA LEGEND','GAMEIO CHAMP','NO BUG FISH','CHAT+ WINNER'])}return{show,pick(k,v){S[k]=v;av.textContent=av()},save(){S.name=name.value||S.name;av.textContent=av();toast('avatar saved')},async create(){S.name=name.value||S.name;S.game=game.value;S.rounds=+rounds.value;S.r=1;S.score=0;S.room=await codeGen(S.game);S.players=[me()];lobby();show('lobby');api('/rooms/'+S.room,'PUT',{game:S.game,rounds:S.rounds,players:{me:me()}});toast('code '+S.room)},async quick(){S.game='fishana';S.rounds=3;S.room=await codeGen('fishana');S.players=[me()];lobby();show('lobby')},async join(){let c=jc.value.toUpperCase();let d=await api('/rooms/'+c);if(!d)return alert('room not found');S.name=jn.value||S.name;S.room=c;S.game=d.game||'fishana';S.rounds=d.rounds||5;S.players=Object.values(d.players||{}).concat(me());lobby();show('lobby')},bot(){S.players.push({name:R(['FishBot','DinoBot','BluffBot']),av:R(['🐟👕👑','🦖🧥🎧','🤖👕⚡']),score:0,x:Math.random()*80,y:Math.random()*70});lobby()},start(){S.r=1;show('play');screen()},ans(p){S.score+=p+Math.floor(Math.random()*7);S.x=Math.random()*85;S.y=Math.random()*75;S.r++;S.r>S.rounds?this.finish():screen()},finish(){boardIt();show('results')},chat(){chat.classList.toggle('open')},emoji(){ct.value+=' 😭⚡🐟 '},flag(k){S[k]=!S[k];panel.textContent=(S.cam?'📹 ':'')+(S.mic?'🎤 ':'')+'Chat+ safe emoji panel';lobby()},send(){if(!ct.value)return;msgs.innerHTML+=`<div class="msg"><b>${S.name}:</b> ${ct.value}</div>`;ct.value=''}}})();Object.entries({fishana:'🎣 Fishana',npat:'📝 Name Place Animal Thing',charades:'🎭 Charades',cars:'🏎 Cars',badamsat:'🥜 Badamsat',bluff:'🃏 Bluff',funnyai:'😂 Funny AI',facetalk:'🗣 FaceTalk'}).forEach(([k,v])=>{let o=document.createElement('option');o.value=k;o.textContent=v;game.appendChild(o)});fetch('https://gameio-7e343-default-rtdb.firebaseio.com/rooms.json').then(()=>server.textContent='Firebase reachable / local backup ready').catch(()=>server.textContent='Preview may block Firebase / local backup ready')
</script>
