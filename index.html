<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GameIO Bright Liquid Glass</title>
<style>
:root{
  --sky1:#ecfbff; --sky2:#bfefff; --sky3:#ffffff;
  --glass:rgba(255,255,255,.72); --line:rgba(65,180,235,.38);
  --blue:#2ec8ff; --blue2:#0f8fe8; --text:#12304a;
  --pink:#ff6bc7; --yellow:#ffcf4a; --green:#45d98a;
}
*{box-sizing:border-box}
body{
  margin:0; min-height:100vh; overflow:hidden; color:var(--text);
  font-family: ui-rounded, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-weight:850;
  background:
    radial-gradient(circle at 18% 10%, rgba(46,200,255,.45), transparent 30%),
    radial-gradient(circle at 90% 0%, rgba(255,255,255,.95), transparent 35%),
    linear-gradient(180deg,var(--sky3),var(--sky1) 35%,var(--sky2));
}
.screen{display:none;position:fixed;inset:0;overflow:auto;padding:18px}
.active{display:block}
.glass{
  max-width:1000px;margin:22px auto;padding:22px;text-align:center;
  border:1px solid var(--line);border-radius:32px;background:var(--glass);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  box-shadow:0 20px 70px rgba(44,165,220,.22), inset 0 1px rgba(255,255,255,.8);
  animation:cardIn .28s ease;
}
.logo{
  font-size:clamp(48px,11vw,98px);letter-spacing:2px;color:var(--blue2);
  text-shadow:0 0 22px rgba(46,200,255,.55), 3px 3px white;
  animation:pulse 1.5s infinite;
}
.btn{
  padding:13px 17px;margin:7px;border:1px solid var(--line);border-radius:17px;
  font:inherit;cursor:pointer;color:#05324f;background:#e9fbff;
  box-shadow:0 8px 18px rgba(42,170,225,.18), inset 0 1px white;
  transition:.12s transform,.12s filter;
}
.btn:hover{transform:translateY(-3px) scale(1.03);filter:brightness(1.05)}
.pink{background:#ffe7f6;color:#9a196c}.blue{background:#d7f7ff;color:#045577}.green{background:#e1fff0;color:#08733e}.dark{background:#aeeeff;color:#07476b}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:12px}
.tile,.player,.gameCard{
  border:1px solid var(--line);border-radius:24px;padding:15px;
  background:rgba(255,255,255,.68);backdrop-filter:blur(14px);
  box-shadow:0 12px 28px rgba(46,200,255,.16);
  animation:bob 2.3s infinite;
}
input,select{
  width:min(430px,92%);padding:13px;margin:7px;border-radius:18px;
  border:1px solid var(--line);color:var(--text);background:rgba(255,255,255,.78);font:inherit;
}
.avatarPreview{font-size:74px;margin:14px;animation:float 1.5s infinite}
.avatarBank{display:flex;flex-wrap:wrap;justify-content:center;gap:6px}
.code{
  font-size:clamp(40px,10vw,70px);color:var(--blue2);cursor:pointer;user-select:all;
  letter-spacing:5px;text-shadow:0 0 18px rgba(46,200,255,.65);animation:glow 1.5s infinite;
}
.hint{font-size:13px;color:#50718c}
.guide{
  width:220px;margin:14px auto;padding:16px;border-radius:36px;
  border:1px solid var(--line);background:rgba(255,255,255,.78);
  box-shadow:0 12px 35px rgba(46,200,255,.18), inset 0 1px white;
  animation:float 1.7s infinite;
}
.guideHead{font-size:60px}
.guideBody{
  width:74px;height:90px;margin:0 auto;border-radius:30px 30px 18px 18px;
  background:linear-gradient(160deg,#bdf5ff,#ffffff,#8de6ff);border:3px solid rgba(46,200,255,.45);
}
.guideArms{font-size:34px;margin-top:-67px;animation:wave 1.2s infinite}
.guideLegs{font-size:34px;margin-top:25px}
.nameTag{font-size:22px;color:var(--blue2);text-shadow:0 0 12px rgba(46,200,255,.5);animation:nameMove 2s infinite}
.players{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:10px;margin:14px 0}
.arena{
  height:310px;position:relative;overflow:hidden;margin:13px 0;border-radius:28px;
  border:1px solid var(--line);background:rgba(255,255,255,.55);backdrop-filter:blur(12px);
}
.dot{position:absolute;font-size:34px;transition:.22s;animation:float 1.2s infinite;text-align:center}
.dot small{display:block;font-size:10px;color:var(--blue2)}
.prompt{border:1px dashed var(--blue2);border-radius:22px;padding:15px;margin:12px;font-size:21px;background:rgba(255,255,255,.65)}
.blast{position:absolute;font-size:44px;animation:boom .55s forwards}
.win{border-color:var(--yellow)!important;box-shadow:0 0 26px var(--yellow)}
.toast{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);display:none;z-index:99;padding:11px 14px;border-radius:14px;background:white;color:var(--blue2);border:1px solid var(--line);box-shadow:0 8px 30px rgba(46,200,255,.25)}
.chatBtn{position:fixed;right:14px;bottom:14px;z-index:60}
.chat{
  position:fixed;right:-370px;top:0;width:min(370px,94vw);height:100vh;z-index:55;
  padding:14px;display:flex;flex-direction:column;transition:.25s;
  background:rgba(255,255,255,.72);backdrop-filter:blur(24px);border-left:1px solid var(--line);
}
.chat.open{right:0}
.msgs{flex:1;overflow:auto;border:1px solid var(--line);border-radius:18px;padding:8px;background:rgba(255,255,255,.55)}
.msg{margin:6px;padding:8px;border-radius:12px;background:rgba(46,200,255,.12);text-align:left}
.fakeVideo{height:112px;display:grid;place-items:center;border-radius:18px;border:1px solid var(--green);color:#078048;background:rgba(255,255,255,.55)}
@keyframes cardIn{from{opacity:0;transform:scale(.96)}to{opacity:1}}
@keyframes pulse{50%{transform:scale(1.05)}}
@keyframes bob{50%{transform:translateY(-7px)}}
@keyframes float{50%{transform:translateY(-7px) rotate(-2deg)}}
@keyframes glow{50%{text-shadow:0 0 28px var(--blue)}}
@keyframes wave{50%{transform:rotate(-9deg)}}
@keyframes nameMove{50%{transform:translateX(9px)}}
@keyframes boom{to{transform:scale(2.2);opacity:0}}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<button class="btn blue chatBtn" onclick="Game.chat()">Chat+</button>

<div id="chat" class="chat">
  <h2>Chat+ 💬</h2>
  <p>
    <button class="btn blue" onclick="Game.flag('cam')">📹</button>
    <button class="btn green" onclick="Game.flag('mic')">🎤</button>
    <button class="btn pink" onclick="Game.emoji()">😀</button>
    <button class="btn dark" onclick="Game.chat()">X</button>
  </p>
  <div id="fakeVideo" class="fakeVideo">📹 safe video emoji panel</div>
  <div id="msgs" class="msgs"></div>
  <input id="chatText" placeholder="type chat">
  <button class="btn green" onclick="Game.send()">Send</button>
</div>

<section id="home" class="screen active">
  <div class="glass">
    <div class="logo">GAME IO</div>
    <p id="server">checking Firebase...</p>
    <button class="btn blue" onclick="Game.show('menu')">PRESS START</button>
  </div>
</section>

<section id="menu" class="screen">
  <div class="glass">
    <h1>Choose Portal</h1>
    <div class="grid">
      <button class="tile" onclick="Game.quick()">J⚡ Quick Fishana</button>
      <button class="tile" onclick="Game.show('avatar')">C⚡ Create</button>
      <button class="tile" onclick="Game.show('join')">CJ Join</button>
    </div>
  </div>
</section>

<section id="avatar" class="screen">
  <div class="glass">
    <h1>Build Avatar</h1>
    <div id="avatarView" class="avatarPreview">😎🧊⚡</div>
    <input id="name" placeholder="Your name">
    <div class="avatarBank">
      <button class="btn" onclick="Game.pick('face','😎')">😎</button>
      <button class="btn" onclick="Game.pick('face','🐟')">🐟</button>
      <button class="btn" onclick="Game.pick('face','🦖')">🦖</button>
      <button class="btn" onclick="Game.pick('face','🤖')">🤖</button>
      <button class="btn" onclick="Game.pick('face','🧑‍🚀')">🧑‍🚀</button>
      <button class="btn" onclick="Game.pick('face','🧙‍♂️')">🧙‍♂️</button>
      <button class="btn" onclick="Game.pick('face','🦸')">🦸</button>
      <button class="btn" onclick="Game.pick('face','🐱')">🐱</button>
      <button class="btn" onclick="Game.pick('face','🐶')">🐶</button>
      <button class="btn" onclick="Game.pick('face','🦊')">🦊</button>
      <button class="btn" onclick="Game.pick('face','🐼')">🐼</button>
      <button class="btn" onclick="Game.pick('face','🐸')">🐸</button>
    </div>
    <p>
      <button class="btn" onclick="Game.pick('body','👕')">👕</button>
      <button class="btn" onclick="Game.pick('body','🧥')">🧥</button>
      <button class="btn" onclick="Game.pick('body','🦺')">🦺</button>
      <button class="btn" onclick="Game.pick('body','🧊')">🧊</button>
      <button class="btn" onclick="Game.pick('acc','👑')">👑</button>
      <button class="btn" onclick="Game.pick('acc','🎧')">🎧</button>
      <button class="btn" onclick="Game.pick('acc','⚡')">⚡</button>
      <button class="btn" onclick="Game.pick('acc','🛡️')">🛡️</button>
    </p>
    <button class="btn green" onclick="Game.saveAvatar()">SAVE</button>
    <button class="btn blue" onclick="Game.show('create')">NEXT</button>
  </div>
</section>

<section id="create" class="screen">
  <div class="glass">
    <h1>Create Room</h1>
    <select id="gameSelect"></select>
    <select id="rounds"><option>3</option><option selected>5</option><option>7</option></select><br>
    <button class="btn blue" onclick="Game.create()">CREATE CODE</button>
    <button class="btn dark" onclick="Game.show('menu')">BACK</button>
  </div>
</section>

<section id="join" class="screen">
  <div class="glass">
    <h1>Join Room</h1>
    <input id="joinCode" placeholder="FISH-A7" style="text-transform:uppercase">
    <input id="joinName" placeholder="Your name"><br>
    <button class="btn blue" onclick="Game.join()">JOIN</button>
    <button class="btn dark" onclick="Game.show('menu')">BACK</button>
  </div>
</section>

<section id="lobby" class="screen">
  <div class="glass">
    <h1>Lobby</h1>
    <div id="roomCode" class="code" onclick="Game.copyCode()" ondblclick="Game.inviteLink()">----</div>
    <p class="hint">tap code = copy • double tap = invite link</p>
    <div class="guide">
      <div id="guideHead" class="guideHead">😎</div>
      <div class="guideBody"></div>
      <div class="guideArms">🖐️   🖐️</div>
      <div class="guideLegs">👟 👟</div>
      <div id="guideName" class="nameTag">Commander ⚡</div>
    </div>
    <p id="roomInfo"></p>
    <div id="players" class="players"></div>
    <button class="btn green" onclick="Game.start()">START GAME</button>
    <button class="btn blue" onclick="Game.addBot()">ADD BOT</button>
    <button class="btn pink" onclick="Game.chat()">Chat+</button>
  </div>
</section>

<section id="play" class="screen">
  <div class="glass">
    <h1 id="gameTitle"></h1>
    <p id="roundScore"></p>
    <div id="arena" class="arena"></div>
    <div id="prompt" class="prompt"></div>
    <div id="answers"></div>
    <button class="btn dark" onclick="Game.finish()">FINISH</button>
  </div>
</section>

<section id="results" class="screen">
  <div class="glass">
    <h1>🏆 Winner Chart</h1>
    <div id="board"></div>
    <h2 id="slogan">CEO OF WINNING</h2>
    <button class="btn green" onclick="Game.rematch()">REMATCH</button>
    <button class="btn blue" onclick="Game.show('menu')">MENU</button>
  </div>
</section>

<script>
const Game=(()=>{
const DB="https://gameio-7e343-default-rtdb.firebaseio.com";
const games={fishana:"🎣 Fishana",npat:"📝 Name Place Animal Thing",charades:"🎭 Charades",cars:"🏎 Cars",badamsat:"🥜 Badamsat",bluff:"🃏 Bluff",funnyai:"😂 Funny AI",facetalk:"🗣 FaceTalk"};
const prefixes={fishana:["FISH","FIN","BUB"],npat:["NPAT","WORD"],charades:["CHAR","ACT"],cars:["CAR","RACE"],badamsat:["BADM","SAT"],bluff:["BLUF","CARD"],funnyai:["LOL","MEME"],facetalk:["FACE","TALK"]};
const prompts={
fishana:[
["TRIPLE FISHANA CHECK 1: Baby Fish found a lightning pearl!",["Bubble Blast","Tail Spin","Hide","Mega Swim"]],
["TRIPLE FISHANA CHECK 2: Fishana evolves now!",["Electric Fin","Shell Shield","Octo Ink","Tiny Bite"]],
["TRIPLE FISHANA CHECK 3: Shark King appears!",["Thunder Wave","Bubble Net","Fin Dash","Sing Song"]]
],
npat:[["Letter D: Name, Place, Animal, Thing",["Dhruv Delhi Dog Drum","Dino Dubai Deer Door","Skip","Fish answer"]]],
charades:[["Act like a T-Rex in traffic",["Roar","Dance","Skip","Freeze"]]],
cars:[["Green light!",["Turbo","Drift","Horn","Brake"]]],
badamsat:[["Badamsat card move",["Safe card","Risk card","Pass","Bluff face"]]],
bluff:[["Player says: three kings",["Believe","Call Bluff","Raise","Stare"]]],
funnyai:[["Funny AI says: I am normal",["Roast it","Trust it","Ask joke","Run"]]],
facetalk:[["Make a victory face",["😎 Cool","😂 Laugh","😭 Drama","🐟 Fish"]]]
};
const slogans=["TRIPLE FISHANA LEGEND","GAMEIO CHAMP","NO BUG FISH","CHAT+ WINNER","CODE KING","LIGHT BLUE LEGEND"];
let st={id:localStorage.gid||("p"+Math.random().toString(36).slice(2,8)),name:"Commander",face:"😎",body:"🧊",acc:"⚡",game:"fishana",rounds:5,round:1,score:0,room:"",players:[],cam:false,mic:false,x:50,y:50};
localStorage.gid=st.id;
const $=id=>document.getElementById(id);
const rand=a=>a[Math.floor(Math.random()*a.length)];
function show(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));$(id).classList.add("active")}
function avatar(){return st.face+st.body+st.acc}
function me(){return{id:st.id,name:st.name,avatar:avatar(),score:st.score,x:st.x,y:st.y,cam:st.cam,mic:st.mic}}
function toast(t){$("toast").textContent=t;$("toast").style.display="block";clearTimeout(toast.t);toast.t=setTimeout(()=>$("toast").style.display="none",1700)}
async function api(path,method="GET",data){try{let opt={method,headers:{"Content-Type":"application/json"}};if(data!==undefined)opt.body=JSON.stringify(data);let r=await fetch(DB+path+".json",opt);return r.ok?await r.json():null}catch(e){return null}}
async function uniqueCode(game){const L="ABCDEFGHJKLMNPQRSTUVWXYZ",N="23456789";for(let i=0;i<25;i++){let c=rand(prefixes[game]||["GAME"])+"-"+rand(L)+rand(N);let exists=await api("/rooms/"+c);if(!exists)return c}return "GAME-"+Date.now().toString(36).slice(-3).toUpperCase()}
function renderGuide(){if($("guideHead"))$("guideHead").textContent=st.face;if($("guideName"))$("guideName").textContent=(st.name||"Commander")+" ⚡"}
function renderLobby(){$("roomCode").textContent=st.room||"----";$("roomInfo").textContent=(games[st.game]||st.game)+" • "+st.rounds+" rounds";renderGuide();$("players").innerHTML=st.players.map((p,i)=>`<div class="player ${i===0?'win':''}"><div style="font-size:30px">${p.avatar||"😎🧊⚡"}</div><div>${p.name||"Player"} ${p.cam?"📹":""}${p.mic?"🎤":""}</div><div>${p.score||0} pts</div></div>`).join("")}
function renderArena(){$("arena").innerHTML="";st.players.forEach(p=>{let d=document.createElement("div");d.className="dot";d.style.left=(p.x||50)+"%";d.style.top=(p.y||50)+"%";d.innerHTML=(p.avatar||"😎")+"<small>"+(p.name||"P").slice(0,8)+"</small>";$("arena").appendChild(d)})}
function renderGame(){let list=prompts[st.game]||prompts.fishana;let item=list[(st.round-1)%list.length];$("gameTitle").textContent=games[st.game]||st.game;$("roundScore").textContent="Round "+st.round+"/"+st.rounds+" • Score "+st.score;$("prompt").textContent=item[0];$("answers").innerHTML=item[1].map((x,i)=>`<button class="btn ${i?'blue':'pink'}" onclick="Game.answer(${20-i*3})">${x}</button>`).join("");renderArena()}
function board(){st.players[0]=me();st.players.forEach((p,i)=>{if(i&&!p.score)p.score=Math.floor(20+Math.random()*100)});st.players.sort((a,b)=>(b.score||0)-(a.score||0));$("board").innerHTML=st.players.map((p,i)=>`<div class="player ${i===0?'win':''}">${["🥇","🥈","🥉","🎖️"][i]||"⭐"} ${p.avatar||""} ${p.name} — ${p.score||0}</div>`).join("");$("slogan").textContent=rand(slogans)}
function init(){Object.entries(games).forEach(([k,v])=>{let o=document.createElement("option");o.value=k;o.textContent=v;$("gameSelect").appendChild(o)});api("/rooms").then(x=>$("server").textContent=x!==null?"Firebase reachable / local backup ready":"Preview may block Firebase / local backup ready")}
return{show,pick(k,v){st[k]=v;$("avatarView").textContent=avatar();renderGuide()},saveAvatar(){st.name=$("name").value.trim()||"Commander";$("avatarView").textContent=avatar();renderGuide();toast("avatar saved")},async create(){st.name=$("name").value.trim()||st.name;st.game=$("gameSelect").value;st.rounds=Number($("rounds").value);st.round=1;st.score=0;st.room=await uniqueCode(st.game);st.x=20+Math.random()*60;st.y=20+Math.random()*55;st.players=[me()];renderLobby();show("lobby");toast("code "+st.room);api("/rooms/"+st.room,"PUT",{game:st.game,rounds:st.rounds,players:{[st.id]:me()}})},async quick(){st.game="fishana";st.rounds=3;st.round=1;st.score=0;st.room=await uniqueCode("fishana");st.players=[me()];renderLobby();show("lobby")},async join(){let c=$("joinCode").value.trim().toUpperCase();if(!c)return toast("enter code");let d=await api("/rooms/"+c);if(!d)return toast("room not found or preview blocked");st.name=$("joinName").value.trim()||st.name;st.room=c;st.game=d.game||"fishana";st.rounds=d.rounds||5;st.players=Object.values(d.players||{});st.players.push(me());renderLobby();show("lobby");api("/rooms/"+c+"/players/"+st.id,"PUT",me())},addBot(){st.players.push({id:"bot"+Math.random(),name:rand(["FishBot","DinoBot","BluffBot"]),avatar:rand(["🐟🧊👑","🦖🧥🎧","🤖🦺⚡"]),score:0,x:Math.random()*80,y:Math.random()*70});renderLobby()},start(){st.round=1;show("play");renderGame()},answer(points){st.score+=points+Math.floor(Math.random()*7);st.x=Math.max(2,Math.min(90,(st.x||50)+(Math.random()*25-12)));st.y=Math.max(2,Math.min(78,(st.y||50)+(Math.random()*25-12)));let b=document.createElement("div");b.className="blast";b.textContent="💥";b.style.left="45%";b.style.top="45%";$("arena").appendChild(b);setTimeout(()=>b.remove(),600);st.round++;if(st.round>st.rounds)this.finish();else renderGame()},finish(){board();show("results")},rematch(){st.round=1;st.score=0;renderLobby();show("lobby")},chat(){$("chat").classList.toggle("open")},emoji(){$("chatText").value+=" 😭⚡🐟 "},flag(k){st[k]=!st[k];$("fakeVideo").textContent=(st.cam?"📹 ":"")+(st.mic?"🎤 ":"")+"Chat+ safe emoji panel";renderLobby()},send(){let t=$("chatText").value.trim();if(!t)return;$("chatText").value="";$("msgs").innerHTML+=`<div class="msg"><b>${st.name}:</b> ${t}</div>`},copyCode(){if(!st.room)return;try{navigator.clipboard&&navigator.clipboard.writeText(st.room)}catch(e){}toast("copied "+st.room)},inviteLink(){if(!st.room)return;let link=location.origin+location.pathname+"?room="+encodeURIComponent(st.room);try{navigator.clipboard&&navigator.clipboard.writeText(link)}catch(e){}toast("invite link copied")},init}})();
Game.init();
</script>
</body></html>
