<!doctype html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><title>GameIO</title><style>body{margin:0;background:#eafaff;color:#123;font-family:system-ui;font-weight:800}.s{display:none;padding:20px}.on{display:block}.card{max-width:850px;margin:20px auto;padding:20px;background:rgba(255,255,255,.8);border-radius:28px;box-shadow:0 12px 50px #9de}.btn{padding:12px 16px;margin:6px;border:0;border-radius:14px;background:#c9f4ff;font-weight:900}.code{font-size:52px;color:#078ed8}.av{font-size:70px;animation:f 1.5s infinite}@keyframes f{50%{transform:translateY(-8px)}}.box{background:white;margin:8px;padding:12px;border-radius:15px}</style></head><body><section id=home class="s on"><div class=card><h1>GAME IO</h1><p id=server>checking...</p><button class=btn onclick="G.show('avatar')">START</button><button class=btn onclick="G.show('joinAvatar')">JOIN</button></div></section><section id=avatar class=s><div class=card><h1>Create Avatar</h1><div id=avatarView class=av>😎🧊⚡</div><input id=name placeholder=name><p><button class=btn onclick="G.pick('face','😎')">😎</button><button class=btn onclick="G.pick('face','🐟')">🐟</button><button class=btn onclick="G.pick('face','🤖')">🤖</button><button class=btn onclick="G.pick('face','🧑‍🚀')">🧑‍🚀</button><button class=btn onclick="G.pick('body','🧊')">🧊</button><button class=btn onclick="G.pick('body','🧥')">🧥</button><button class=btn onclick="G.pick('acc','⚡')">⚡</button><button class=btn onclick="G.pick('acc','👑')">👑</button></p><button class=btn onclick="G.show('create')">NEXT</button></div></section><section id=joinAvatar class=s><div class=card><h1>Join Avatar</h1><div id=joinAvatarView class=av>😎🧊⚡</div><input id=joinName placeholder=name><p><button class=btn onclick="G.pickJoin('face','😎')">😎</button><button class=btn onclick="G.pickJoin('face','🐟')">🐟</button><button class=btn onclick="G.pickJoin('face','🤖')">🤖</button><button class=btn onclick="G.pickJoin('face','🧑‍🚀')">🧑‍🚀</button><button class=btn onclick="G.pickJoin('body','🧊')">🧊</button><button class=btn onclick="G.pickJoin('body','🧥')">🧥</button><button class=btn onclick="G.pickJoin('acc','⚡')">⚡</button><button class=btn onclick="G.pickJoin('acc','👑')">👑</button></p><button class=btn onclick="G.show('join')">NEXT</button></div></section><section id=create class=s><div class=card><h1>Create</h1><select id=game></select><button class=btn onclick="G.create()">CREATE ONLINE ROOM</button><p id=online></p></div></section><section id=join class=s><div class=card><h1>Join Room</h1><input id=joinCode placeholder=FISH-A7><button class=btn onclick="G.join()">JOIN</button></div></section><section id=lobby class=s><div class=card><h1>Lobby</h1><div id=code class=code onclick="G.copy()">----</div><p id=status></p><div id=guide class=av>😎</div><h2 id=tag>Commander ⚡</h2><div id=players></div><button class=btn onclick="G.start()">START GAME</button><button class=btn onclick="G.bot()">ADD BOT</button></div></section><section id=play class=s><div class=card><h1 id=title></h1><p id=score></p><div id=prompt class=box></div><div id=answers></div><button class=btn onclick="G.finish()">FINISH</button></div></section><section id=results class=s><div class=card><h1>Winner</h1><div id=board></div><button class=btn onclick="G.show('lobby')">BACK</button></div></section><script>const G=(()=>{const DB='https://gameio-7e343-default-rtdb.firebaseio.com';const games={fishana:'Fishana',npat:'NPAT',charades:'Charades',cars:'Cars',badamsat:'Badamsat',bluff:'Bluff',funnyai:'Funny AI',facetalk:'FaceTalk'};const pre={fishana:['FISH','FIN','BUB'],npat:['NPAT','WORD'],charades:['CHAR','ACT'],cars:['CAR','RACE'],badamsat:['BADM','SAT'],bluff:['BLUF','CARD'],funnyai:['LOL','MEME'],facetalk:['FACE','TALK']};const P={fishana:[['Fishana 1 pearl found',['Bubble','Tail','Hide','Swim']],['Fishana 2 evolve',['Fin','Shield','Ink','Bite']],['Fishana 3 Shark King',['Thunder','Net','Dash','Sing']]],npat:[['Letter D',['Dhruv Delhi Dog Drum','Dino Dubai Deer Door','Skip','Fish']]],charades:[['T-Rex traffic',['Roar','Dance','Skip','Freeze']]],cars:[['Green light',['Turbo','Drift','Horn','Brake']]],badamsat:[['Badamsat move',['Safe','Risk','Pass','Bluff']]],bluff:[['Three kings?',['Believe','Call','Raise','Stare']]],funnyai:[['AI normal?',['Roast','Trust','Joke','Run']]],facetalk:[['Victory face',['Cool','Laugh','Drama','Fish']]]};let S={id:localStorage.gid||('p'+Math.random().toString(36).slice(2,8)),name:'Commander',face:'😎',body:'🧊',acc:'⚡',game:'fishana',room:'',round:1,score:0,players:[]};localStorage.gid=S.id;let J={face:'😎',body:'🧊',acc:'⚡'};const $=x=>document.getElementById(x);const R=a=>a[Math.floor(Math.random()*a.length)];function show(id){document.querySelectorAll('.s').forEach(s=>s.classList.remove('on'));$(id).classList.add('on')}function av(){return S.face+S.body+S.acc}function jav(){return J.face+J.body+J.acc}function me(){return{id:S.id,name:S.name,avatar:av(),face:S.face,body:S.body,acc:S.acc,score:S.score,at:Date.now()}}async function api(p,m='GET',d){try{let o={method:m,headers:{'Content-Type':'application/json'}};if(d!==undefined)o.body=JSON.stringify(d);let r=await fetch(DB+p+'.json',o);return r.ok?await r.json():null}catch(e){return null}}async function roomCode(g){let L='ABCDEFGHJKLMNPQRSTUVWXYZ',N='23456789';for(let i=0;i<40;i++){let c=R(pre[g]||['GAME'])+'-'+R(L)+R(N);if(!await api('/rooms/'+c))return c}return 'GAME-'+Date.now().toString(36).slice(-3).toUpperCase()}async function waitRoom(c){for(let i=0;i<6;i++){let d=await api('/rooms/'+c);if(d&&d.players)return d;await new Promise(r=>setTimeout(r,500))}return null}function render(){code.textContent=S.room;status.textContent=S.room?'Online room: '+S.room:'not online';guide.textContent=S.face;tag.textContent=S.name+' ⚡';players.innerHTML=S.players.map(p=>'<div class=box>'+p.avatar+' '+p.name+' '+(p.score||0)+'</div>').join('')}async function sync(){let d=await api('/rooms/'+S.room);if(d&&d.players){S.players=Object.values(d.players);render()}}function gameScreen(){let list=P[S.game]||P.fishana,item=list[(S.round-1)%list.length];title.textContent=games[S.game];score.textContent='Round '+S.round+' Score '+S.score;prompt.textContent=item[0];answers.innerHTML=item[1].map((a,i)=>'<button class=btn onclick="G.ans('+(20-i*3)+')">'+a+'</button>').join('')}function boardShow(){S.players[0]=me();board.innerHTML=S.players.map(p=>'<div class=box>'+p.avatar+' '+p.name+' '+(p.score||0)+'</div>').join('')}return{show,pick(k,v){S[k]=v;avatarView.textContent=av()},pickJoin(k,v){J[k]=v;joinAvatarView.textContent=jav()},async create(){S.name=name.value||S.name;S.game=game.value;online.textContent='writing Firebase...';S.room=await roomCode(S.game);let data={game:S.game,rounds:3,status:'lobby',createdAt:Date.now(),players:{[S.id]:me()}};await api('/rooms/'+S.room,'PUT',data);let ok=await waitRoom(S.room);if(!ok){online.textContent='Firebase failed: local only';S.players=[me()];render();show('lobby');return}online.textContent='Online room ready';S.players=Object.values(ok.players);render();show('lobby')},async join(){let c=joinCode.value.trim().toUpperCase();if(!c)return alert('enter code');S.name=joinName.value||S.name;S.face=J.face;S.body=J.body;S.acc=J.acc;let d=await waitRoom(c);if(!d)return alert('room not found in Firebase');S.room=c;S.game=d.game||'fishana';await api('/rooms/'+c+'/players/'+S.id,'PUT',me());await sync();show('lobby')},quick(){S.game='fishana';this.create()},bot(){S.players.push({id:'bot',name:'FishBot',avatar:'🐟🧊👑',score:0});render()},start(){S.round=1;show('play');gameScreen()},ans(p){S.score+=p;S.round++;if(S.round>3)this.finish();else gameScreen()},finish(){boardShow();show('results')},copy(){navigator.clipboard&&navigator.clipboard.writeText(S.room);alert('copied '+S.room)},async init(){Object.keys(games).forEach(k=>{let o=document.createElement('option');o.value=k;o.textContent=games[k];game.appendChild(o)});server.textContent=await api('/rooms')!==null?'Firebase reachable':'Firebase null or rules issue'}}})();G.init();</script></body></html>
