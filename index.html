<!doctype html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><title>GameIO</title><style>body{margin:0;min-height:100vh;background:linear-gradient(180deg,#fff,#eafaff,#bfefff);color:#12304a;font-family:system-ui;font-weight:850}.s{display:none;padding:20px}.on{display:block}.card{max-width:900px;margin:20px auto;padding:22px;text-align:center;background:rgba(255,255,255,.78);border:1px solid rgba(60,170,230,.35);border-radius:32px;box-shadow:0 18px 55px rgba(48,170,230,.25);backdrop-filter:blur(20px)}.logo{font-size:70px;color:#0f8fe8;text-shadow:0 0 18px #8ee8ff,3px 3px white;animation:pulse 1.4s infinite}.btn{padding:13px 17px;margin:7px;border:1px solid rgba(60,170,230,.35);border-radius:18px;background:#d7f7ff;font-weight:900;color:#06324c;box-shadow:0 8px 18px rgba(46,200,255,.18);cursor:pointer}.btn:hover{transform:translateY(-3px) scale(1.03)}.code{font-size:56px;color:#078ed8;cursor:pointer;letter-spacing:4px;text-shadow:0 0 18px #8ee8ff}.av{font-size:72px;animation:float 1.5s infinite}.box{background:rgba(255,255,255,.74);border:1px solid rgba(60,170,230,.35);margin:8px;padding:13px;border-radius:20px;box-shadow:0 10px 28px rgba(46,200,255,.14)}.players{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr))}.avatarBank{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}.guide{width:220px;margin:14px auto;padding:15px;border-radius:34px;background:rgba(255,255,255,.82);border:1px solid rgba(60,170,230,.35);box-shadow:0 10px 30px rgba(46,200,255,.18);animation:float 1.7s infinite}.body{width:74px;height:88px;margin:0 auto;border-radius:30px 30px 18px 18px;background:linear-gradient(160deg,#bdf5ff,#fff,#8de6ff);border:3px solid rgba(46,200,255,.45)}.arms{font-size:34px;margin-top:-66px;animation:wave 1.2s infinite}.legs{font-size:34px;margin-top:25px}.tag{font-size:22px;color:#0f8fe8;animation:name 2s infinite}.arena{min-height:170px;background:rgba(255,255,255,.6);border:1px dashed #0f8fe8;border-radius:24px;padding:16px;margin:10px;font-size:22px}@keyframes pulse{50%{transform:scale(1.05)}}@keyframes float{50%{transform:translateY(-8px) rotate(-2deg)}}@keyframes wave{50%{transform:rotate(-9deg)}}@keyframes name{50%{transform:translateX(8px)}}</style></head><body><section id=home class="s on"><div class=card><div class=logo>GAME IO</div><p id=server>ready</p><button class=btn onclick="G.show('avatar')">CREATE</button><button class=btn onclick="G.show('joinAvatar')">JOIN</button></div></section><section id=avatar class=s><div class=card><h1>Create Avatar</h1><div id=avatarView class=av>😎🧊⚡</div><input id=name placeholder=name><div class=avatarBank><button class=btn onclick="G.pick('face','😎')">😎</button><button class=btn onclick="G.pick('face','🐟')">🐟</button><button class=btn onclick="G.pick('face','🤖')">🤖</button><button class=btn onclick="G.pick('face','🧑‍🚀')">🧑‍🚀</button><button class=btn onclick="G.pick('face','🦖')">🦖</button><button class=btn onclick="G.pick('face','🦸')">🦸</button><button class=btn onclick="G.pick('body','🧊')">🧊</button><button class=btn onclick="G.pick('body','🧥')">🧥</button><button class=btn onclick="G.pick('acc','⚡')">⚡</button><button class=btn onclick="G.pick('acc','👑')">👑</button></div><button class=btn onclick="G.show('create')">NEXT</button></div></section><section id=joinAvatar class=s><div class=card><h1>Join Avatar</h1><div id=joinAvatarView class=av>😎🧊⚡</div><input id=joinName placeholder=name><div class=avatarBank><button class=btn onclick="G.pickJoin('face','😎')">😎</button><button class=btn onclick="G.pickJoin('face','🐟')">🐟</button><button class=btn onclick="G.pickJoin('face','🤖')">🤖</button><button class=btn onclick="G.pickJoin('face','🧑‍🚀')">🧑‍🚀</button><button class=btn onclick="G.pickJoin('face','🦖')">🦖</button><button class=btn onclick="G.pickJoin('body','🧊')">🧊</button><button class=btn onclick="G.pickJoin('body','🧥')">🧥</button><button class=btn onclick="G.pickJoin('acc','⚡')">⚡</button><button class=btn onclick="G.pickJoin('acc','👑')">👑</button></div><button class=btn onclick="G.show('join')">NEXT</button></div></section><section id=create class=s><div class=card><h1>Create Room</h1><select id=gameSelect></select><button class=btn onclick="G.create()">CREATE ONLINE ROOM</button><p id=online></p></div></section><section id=join class=s><div class=card><h1>Join Room</h1><input id=joinCode placeholder=FISH-A7><button class=btn onclick="G.join()">JOIN</button></div></section><section id=lobby class=s><div class=card><h1>Lobby</h1><div id=code class=code onclick="G.copy()">----</div><p id=status></p><div class=guide><div id=guide class=av>😎</div><div class=body></div><div class=arms>🖐️   🖐️</div><div class=legs>👟 👟</div><h2 id=tag class=tag>Commander ⚡</h2></div><div id=players class=players></div><button class=btn onclick="G.start()">START GAME</button><button class=btn onclick="G.bot()">ADD BOT</button></div></section><section id=play class=s><div class=card><h1 id=title>Game</h1><p id=score>Score 0</p><div id=prompt class=arena>Prompt</div><div id=answers></div><button class=btn onclick="G.finish()">FINISH</button></div></section><section id=results class=s><div class=card><h1>Winner Chart</h1><div id=board></div><button class=btn onclick="G.show('lobby')">BACK</button></div></section><script>const DB='https://gameio-7e343-default-rtdb.firebaseio.com';const GAME_DATA={fishana:{name:'Fishana',code:['FISH','FIN','BUB'],rounds:[['Fishana 1: pearl found',['Bubble Blast','Tail Spin','Hide','Mega Swim']],['Fishana 2: evolve',['Electric Fin','Shell Shield','Octo Ink','Tiny Bite']],['Fishana 3: Shark King',['Thunder Wave','Bubble Net','Fin Dash','Sing Song']]]},npat:{name:'Name Place Animal Thing',code:['NPAT','WORD'],rounds:[['Letter D',['Dhruv Delhi Dog Drum','Dino Dubai Deer Door','Skip','Fish Answer']]]},charades:{name:'Charades',code:['CHAR','ACT'],rounds:[['T-Rex traffic',['Roar','Dance','Skip','Freeze']]]},cars:{name:'Cars',code:['CAR','RACE'],rounds:[['Green light',['Turbo','Drift','Horn','Brake']]]},badamsat:{name:'Badamsat',code:['BADM','SAT'],rounds:[['Badamsat move',['Safe Card','Risk Card','Pass','Bluff Face']]]},bluff:{name:'Bluff',code:['BLUF','CARD'],rounds:[['Three kings?',['Believe','Call Bluff','Raise','Stare']]]},funnyai:{name:'Funny AI',code:['LOL','MEME'],rounds:[['AI normal?',['Roast It','Trust It','Ask Joke','Run']]]},facetalk:{name:'FaceTalk',code:['FACE','TALK'],rounds:[['Victory face',['Cool','Laugh','Drama','Fish']]]},riddle:{name:'Riddle',code:['RIDL'],rounds:[['I have cities but no houses',['Map','Cloud','Shoe','Fish']]]},emoji:{name:'Emoji Guess',code:['EMO'],rounds:[['Guess: 🦁👑',['Lion King','Fishana','Car Race','Bluff']]]},mathdash:{name:'Math Dash',code:['MATH'],rounds:[['5 + 7 = ?',['12','10','57','Fish']]]}};const G=(()=>{let S={id:localStorage.gid||('p'+Math.random().toString(36).slice(2,8)),name:'Commander',face:'😎',body:'🧊',acc:'⚡',game:'fishana',room:'',round:1,score:0,players:[],loop:null};localStorage.gid=S.id;let J={face:'😎',body:'🧊',acc:'⚡'};const $=x=>document.getElementById(x);const R=a=>a[Math.floor(Math.random()*a.length)];function show(id){document.querySelectorAll('.s').forEach(x=>x.classList.remove('on'));$(id).classList.add('on')}function av(){return S.face+S.body+S.acc}function jav(){return J.face+J.body+J.acc}function me(){return{id:S.id,name:S.name,avatar:av(),score:S.score,at:Date.now()}}async function api(p,m='GET',d){try{let o={method:m,headers:{'Content-Type':'application/json'}};if(d!==undefined)o.body=JSON.stringify(d);let r=await fetch(DB+p+'.json',o);return r.ok?await r.json():null}catch(e){return null}}async function makeCode(g){let a=(GAME_DATA[g]||GAME_DATA.fishana).code,L='ABCDEFGHJKLMNPQRSTUVWXYZ',N='23456789';for(let i=0;i<30;i++){let c=R(a)+'-'+R(L)+R(N);if(!await api('/rooms/'+c))return c}return 'GAME-'+Date.now().toString(36).slice(-3).toUpperCase()}async function waitRoom(c){for(let i=0;i<6;i++){let d=await api('/rooms/'+c);if(d&&d.players)return d;await new Promise(r=>setTimeout(r,400))}return null}function renderLobby(){code.textContent=S.room||'----';status.textContent=S.room?'Online room: '+S.room:'not online';guide.textContent=S.face;tag.textContent=S.name+' ⚡';players.innerHTML=S.players.map(p=>'<div class=box>'+p.avatar+' '+p.name+' '+(p.score||0)+'</div>').join('')}async function sync(){if(!S.room)return;let d=await api('/rooms/'+S.room);if(d&&d.players){S.game=d.game||S.game;S.players=Object.values(d.players);renderLobby()}}function listen(){clearInterval(S.loop);S.loop=setInterval(sync,900)}function runGame(){let g=GAME_DATA[S.game]||GAME_DATA.fishana;let idx=(S.round-1)%g.rounds.length;let row=g.rounds[idx];title.textContent=g.name;score.textContent='Round '+S.round+'/3 • Score '+S.score;prompt.innerHTML='<b>'+row[0]+'</b>';answers.innerHTML='';row[1].forEach((ans,i)=>{let b=document.createElement('button');b.className='btn';b.textContent=ans;b.onclick=()=>G.ans(20-i*3);answers.appendChild(b)})}async function pushScore(){if(S.room)await api('/rooms/'+S.room+'/players/'+S.id,'PATCH',me())}async function finalBoard(){await sync();S.players.sort((a,b)=>(b.score||0)-(a.score||0));board.innerHTML=S.players.map((p,i)=>'<div class=box>'+(['🥇','🥈','🥉','🎖️'][i]||'⭐')+' '+p.avatar+' '+p.name+' '+(p.score||0)+'</div>').join('')}return{show,pick(k,v){S[k]=v;avatarView.textContent=av()},pickJoin(k,v){J[k]=v;joinAvatarView.textContent=jav()},async create(){S.name=name.value||S.name;S.game=gameSelect.value||'fishana';online.textContent='writing Firebase...';S.room=await makeCode(S.game);let data={game:S.game,players:{[S.id]:me()},createdAt:Date.now()};await api('/rooms/'+S.room,'PUT',data);let ok=await waitRoom(S.room);S.players=ok?Object.values(ok.players):[me()];renderLobby();show('lobby');listen()},async join(){let c=joinCode.value.trim().toUpperCase();if(!c)return alert('enter code');S.name=joinName.value||S.name;S.face=J.face;S.body=J.body;S.acc=J.acc;let d=await waitRoom(c);if(!d)return alert('room not found');S.room=c;S.game=d.game||'fishana';await api('/rooms/'+c+'/players/'+S.id,'PUT',me());await sync();show('lobby');listen()},bot(){S.players.push({id:'bot'+Math.random(),name:'FishBot',avatar:'🐟🧊👑',score:0});renderLobby()},start(){S.round=1;show('play');runGame()},async ans(p){S.score+=p;await pushScore();S.round++;if(S.round>3){this.finish()}else{runGame()}},async finish(){await pushScore();await finalBoard();show('results')},copy(){navigator.clipboard&&navigator.clipboard.writeText(S.room);alert('copied '+S.room)},init(){Object.keys(GAME_DATA).forEach(k=>{let o=document.createElement('option');o.value=k;o.textContent=GAME_DATA[k].name;gameSelect.appendChild(o)});server.textContent='GameIO ready'}}})();G.init();</script></body></html>
