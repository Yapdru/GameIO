<!doctype html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><title>GameIO V2</title><style>body{margin:0;min-height:100vh;background:radial-gradient(circle at 10% 0,#fff,transparent 30%),radial-gradient(circle at 90% 8%,#8be8ff66,transparent 34%),linear-gradient(180deg,#fff,#eafaff,#bfefff);color:#12304a;font-family:system-ui;font-weight:850}.s{display:none;padding:18px}.on{display:block}.card{max-width:960px;margin:18px auto;padding:22px;text-align:center;background:rgba(255,255,255,.82);border:1px solid rgba(60,170,230,.35);border-radius:32px;box-shadow:0 18px 55px rgba(48,170,230,.25);backdrop-filter:blur(20px)}.logo{font-size:72px;color:#0f8fe8;text-shadow:0 0 18px #8ee8ff,3px 3px white;animation:pulse 1.4s infinite}.btn{padding:13px 17px;margin:7px;border:1px solid rgba(60,170,230,.35);border-radius:18px;background:#d7f7ff;font-weight:900;color:#06324c;box-shadow:0 8px 18px rgba(46,200,255,.18);cursor:pointer}.btn:hover{transform:translateY(-3px) scale(1.03)}.code{font-size:56px;color:#078ed8;cursor:pointer;letter-spacing:4px;text-shadow:0 0 18px #8ee8ff}.av{font-size:72px;animation:float 1.5s infinite}.box{background:rgba(255,255,255,.76);border:1px solid rgba(60,170,230,.35);margin:8px;padding:13px;border-radius:20px;box-shadow:0 10px 28px rgba(46,200,255,.14)}.players{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr))}.avatarBank,.gameGrid{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}.gameTile{width:135px;min-height:110px;padding:12px;border-radius:22px;background:linear-gradient(160deg,#fff,#dcf8ff);border:1px solid #8bdfff;box-shadow:0 10px 24px #7fdfff55;cursor:pointer;display:grid;place-items:center}.gameTile.sel{outline:4px solid #0f8fe8;background:linear-gradient(160deg,#bdf5ff,#fff)}.gameIcon{font-size:36px}.guide{width:220px;margin:14px auto;padding:15px;border-radius:34px;background:rgba(255,255,255,.84);border:1px solid rgba(60,170,230,.35);box-shadow:0 10px 30px rgba(46,200,255,.18);animation:float 1.7s infinite}.body{width:74px;height:88px;margin:0 auto;border-radius:30px 30px 18px 18px;background:linear-gradient(160deg,#bdf5ff,#fff,#8de6ff);border:3px solid rgba(46,200,255,.45)}.arms{font-size:34px;margin-top:-66px;animation:wave 1.2s infinite}.legs{font-size:34px;margin-top:25px}.tag{font-size:22px;color:#0f8fe8;animation:name 2s infinite}.arena{min-height:235px;background:linear-gradient(180deg,#fff,#e8fbff);border:2px dashed #0f8fe8;border-radius:28px;padding:16px;margin:10px;font-size:22px;position:relative;overflow:hidden}.arena:before{content:'🏁';position:absolute;left:12px;bottom:8px;font-size:34px;animation:drive 3s infinite}.arena:after{content:'⚡';position:absolute;right:18px;top:12px;font-size:42px;animation:pulse 1s infinite}.question{font-size:27px;margin-top:25px}.choice{display:block;width:min(520px,92%);margin:10px auto}.fx{font-size:46px;animation:pop .6s}.miniTrack{height:54px;border-radius:22px;background:linear-gradient(90deg,#dff8ff,#fff,#dff8ff);margin:8px;overflow:hidden}.car{font-size:36px;animation:race 1.8s infinite}.podium{font-size:24px}.camera{position:absolute;left:12px;top:12px}.joy{position:absolute;right:14px;bottom:14px;width:74px;height:74px;border-radius:50%;background:#d7f7ff;border:3px solid #0f8fe8;display:grid;place-items:center;font-size:30px}@keyframes pulse{50%{transform:scale(1.05)}}@keyframes float{50%{transform:translateY(-8px) rotate(-2deg)}}@keyframes wave{50%{transform:rotate(-9deg)}}@keyframes name{50%{transform:translateX(8px)}}@keyframes pop{50%{transform:scale(1.25)}}@keyframes race{50%{transform:translateX(140px)}}@keyframes drive{50%{transform:translateX(80px)}}</style></head><body><section id="home" class="s on"><div class="card"><div class="logo">GAME IO</div><p id="server">ready</p><button class="btn" onclick="G.show('avatar')">CREATE</button><button class="btn" onclick="G.show('joinAvatar')">JOIN</button></div></section><section id="avatar" class="s"><div class="card"><h1>Create Avatar</h1><div id="avatarView" class="av">😎🧊⚡</div><input id="name" placeholder="name"><div class="avatarBank"><button class="btn" onclick="G.pick('face','😎')">😎</button><button class="btn" onclick="G.pick('face','🐟')">🐟</button><button class="btn" onclick="G.pick('face','🤖')">🤖</button><button class="btn" onclick="G.pick('face','🧑‍🚀')">🧑‍🚀</button><button class="btn" onclick="G.pick('face','🦖')">🦖</button><button class="btn" onclick="G.pick('face','🦸')">🦸</button><button class="btn" onclick="G.pick('body','🧊')">🧊</button><button class="btn" onclick="G.pick('body','🧥')">🧥</button><button class="btn" onclick="G.pick('acc','⚡')">⚡</button><button class="btn" onclick="G.pick('acc','👑')">👑</button></div><button class="btn" onclick="G.show('create')">NEXT</button></div></section><section id="joinAvatar" class="s"><div class="card"><h1>Join Avatar</h1><div id="joinAvatarView" class="av">😎🧊⚡</div><input id="joinName" placeholder="name"><div class="avatarBank"><button class="btn" onclick="G.pickJoin('face','😎')">😎</button><button class="btn" onclick="G.pickJoin('face','🐟')">🐟</button><button class="btn" onclick="G.pickJoin('face','🤖')">🤖</button><button class="btn" onclick="G.pickJoin('face','🧑‍🚀')">🧑‍🚀</button><button class="btn" onclick="G.pickJoin('face','🦖')">🦖</button><button class="btn" onclick="G.pickJoin('body','🧊')">🧊</button><button class="btn" onclick="G.pickJoin('body','🧥')">🧥</button><button class="btn" onclick="G.pickJoin('acc','⚡')">⚡</button><button class="btn" onclick="G.pickJoin('acc','👑')">👑</button></div><button class="btn" onclick="G.show('join')">NEXT</button></div></section><section id="create" class="s"><div class="card"><h1>Pick Game</h1><select id="gameSelect" style="display:none"></select><div id="gameGrid" class="gameGrid"></div><button class="btn" onclick="G.create()">CREATE ONLINE ROOM</button><p id="online"></p></div></section><section id="join" class="s"><div class="card"><h1>Join Room</h1><input id="joinCode" placeholder="FISH-D6"><button class="btn" onclick="G.join()">JOIN</button></div></section><section id="lobby" class="s"><div class="card"><h1>Lobby</h1><div id="code" class="code" onclick="G.copy()">----</div><p id="status"></p><div class="guide"><div id="guide" class="av">😎</div><div class="body"></div><div class="arms">🖐️   🖐️</div><div class="legs">👟 👟</div><h2 id="tag" class="tag">Commander ⚡</h2></div><div id="players" class="players"></div><button class="btn" onclick="G.start()">START GAME</button><button class="btn" onclick="G.bot()">ADD BOT</button></div></section><section id="play" class="s"><div class="card"><h1 id="title">Game</h1><p id="score">Score 0</p><div id="prompt" class="arena">Prompt</div><div id="answers"></div><button class="btn" onclick="G.finish()">FINISH</button></div></section><section id="results" class="s"><div class="card"><h1>🏆 Winner Festival</h1><div id="board"></div><button class="btn" onclick="G.show('lobby')">REMATCH LOBBY</button></div></section><script>const DB='https://gameio-7e343-default-rtdb.firebaseio.com';const GAME_DATA={fishana:{icon:'🎣',name:'Fishana 3D',code:['FISH','FIN','BUB','WAVE'],scene:'🌊🐟💎🦈',rounds:[['Collect the lightning pearl!',['Bubble Boost','Tail Spin','Pearl Dash','Mega Swim']],['Shark King incoming!',['Thunder Wave','Bubble Net','Fin Drift','Hide in Reef']],['Final ocean sprint!',['Nitro Swim','Camera Flip','Pearl Shield','Tsunami Jump']]]},badamsat:{icon:'🥜',name:'Badaam Saat',code:['BADM','SAT','ALM'],scene:'🃏♥️7️⃣✨',rounds:[['7 of Hearts starts the table',['Play 7♥','Pass','Peek Hand','Stack Cards']],['Build the heart row',['Play 8♥','Play 6♥','Pass','Bluff Smile']],['Empty your hand first',['Play Card','Pass','Combo Move','Table Sweep']]]},cars:{icon:'🏎️',name:'Cars FH-ish',code:['CAR','RACE','DRFT'],scene:'🏁🏎️💨⚡',rounds:[['Green light!',['Nitro','Drift','Camera Chase','Boost Pad']],['Corner incoming!',['Handbrake','Clean Turn','Wall Tap','Turbo Exit']],['Final sprint!',['Full Nitro','Slipstream','Jump Ramp','Photo Finish']]]},npat:{icon:'📝',name:'NPAT Arena',code:['NPAT','WORD'],scene:'📚✏️⏱️',rounds:[['Letter D — fastest set wins',['Dhruv Delhi Dog Drum','Dino Dubai Deer Door','Duck Dubai Drum Door','Fish Answer']]]},charades:{icon:'🎭',name:'Charades',code:['CHAR','ACT'],scene:'🎬🕺🎭',rounds:[['Act like a T-Rex in traffic',['Roar','Dance','Tiny Arms','Freeze']]]},bluff:{icon:'🃏',name:'Bluff',code:['BLUF','CARD'],scene:'🃏👀💥',rounds:[['Someone says: three kings',['Believe','Call Bluff','Raise','Stare']]]},funnyai:{icon:'😂',name:'Funny AI',code:['LOL','MEME'],scene:'🤖😂📢',rounds:[['AI says: I am totally normal',['Roast It','Trust It','Ask Joke','Run']]]},facetalk:{icon:'🗣️',name:'FaceTalk',code:['FACE','TALK'],scene:'😎🎤📹',rounds:[['Make your victory face',['Cool','Laugh','Drama','Fish Face']]]},riddle:{icon:'❓',name:'Riddle',code:['RIDL'],scene:'🧩🧠✨',rounds:[['I have cities but no houses',['Map','Cloud','Shoe','Fish']]]},emoji:{icon:'😀',name:'Emoji Guess',code:['EMO'],scene:'🦁👑🎞️',rounds:[['Guess: 🦁👑',['Lion King','Fishana','Car Race','Bluff']]]},mathdash:{icon:'➕',name:'Math Dash',code:['MATH'],scene:'🏎️➕⚡',rounds:[['5 + 7 = ?',['12','10','57','Fish']]]},spacedash:{icon:'🚀',name:'Space Dash',code:['SPACE'],scene:'🚀🪐🌌',rounds:[['Asteroid field!',['Boost','Shield','Barrel Roll','Warp']]]},dino:{icon:'🦖',name:'Dino Escape',code:['DINO'],scene:'🦖🌋🏃',rounds:[['Lava behind you!',['Jump','Roar','Hide','Sprint']]]},dragon:{icon:'🐉',name:'Dragon Dodge',code:['DRGN'],scene:'🐉🔥🛡️',rounds:[['Dragon breath!',['Dodge','Shield','Counter','Freeze']]]},ice:{icon:'🧊',name:'Ice Drift',code:['ICE'],scene:'🧊🏎️❄️',rounds:[['Slippery turn!',['Drift','Brake','Slide','Boost']]]},lava:{icon:'🌋',name:'Lava Floor',code:['LAVA'],scene:'🌋🔥🦶',rounds:[['Floor is lava!',['Hop','Climb','Freeze','Dash']]]},beat:{icon:'🎵',name:'Beat Rush',code:['BEAT'],scene:'🎵⚡🥁',rounds:[['Hit the beat!',['Tap','Hold','Slide','Spin']]]},memory:{icon:'🧠',name:'Memory Run',code:['MEM'],scene:'🧠✨🏃',rounds:[['Remember: fish-car-star',['Fish Car Star','Star Car Fish','Fish Star Car','Run']]]}};const G=(()=>{let S={id:localStorage.gid||('p'+Math.random().toString(36).slice(2,8)),name:'Commander',face:'😎',body:'🧊',acc:'⚡',game:'fishana',room:'',round:1,score:0,players:[],loop:null};localStorage.gid=S.id;let J={face:'😎',body:'🧊',acc:'⚡'};const $=x=>document.getElementById(x);const R=a=>a[Math.floor(Math.random()*a.length)];function txt(id,v){let e=$(id);if(e)e.textContent=v}function html(id,v){let e=$(id);if(e)e.innerHTML=v}function showPage(id){document.querySelectorAll('.s').forEach(x=>x.classList.remove('on'));$(id).classList.add('on')}function av(){return S.face+S.body+S.acc}function jav(){return J.face+J.body+J.acc}function me(){return{id:S.id,name:S.name,avatar:av(),score:S.score,at:Date.now()}}async function api(p,m='GET',d){try{let o={method:m,headers:{'Content-Type':'application/json'}};if(d!==undefined)o.body=JSON.stringify(d);let r=await fetch(DB+p+'.json',o);return r.ok?await r.json():null}catch(e){return null}}async function makeCode(g){let a=(GAME_DATA[g]||GAME_DATA.fishana).code,L='ABCDEFGHJKLMNPQRSTUVWXYZ',N='23456789';for(let i=0;i<30;i++){let c=R(a)+'-'+R(L)+R(N);if(!await api('/rooms/'+c))return c}return 'GAME-'+Date.now().toString(36).slice(-3).toUpperCase()}async function waitRoom(c){for(let i=0;i<6;i++){let d=await api('/rooms/'+c);if(d&&d.players)return d;await new Promise(r=>setTimeout(r,400))}return null}function renderLobby(){txt('code',S.room||'----');txt('status',S.room?'Online room: '+S.room+' • '+(GAME_DATA[S.game]||GAME_DATA.fishana).name:'not online');txt('guide',S.face);txt('tag',S.name+' ⚡');html('players',S.players.map(p=>'<div class="box">'+p.avatar+' '+p.name+' '+(p.score||0)+'</div>').join(''))}async function sync(){if(!S.room)return;let d=await api('/rooms/'+S.room);if(d&&d.players){S.game=d.game||S.game;S.players=Object.values(d.players);renderLobby()}}function listen(){clearInterval(S.loop);S.loop=setInterval(sync,900)}function renderGames(){let grid=$('gameGrid');if(!grid)return;grid.innerHTML='';Object.keys(GAME_DATA).forEach(k=>{let g=GAME_DATA[k];let d=document.createElement('div');d.className='gameTile '+(S.game===k?'sel':'');d.innerHTML='<div class="gameIcon">'+g.icon+'</div><b>'+g.name+'</b><br><small>'+g.code[0]+' codes</small>';d.onclick=function(){S.game=k;$('gameSelect').value=k;renderGames()};grid.appendChild(d)})}function runGame(){let g=GAME_DATA[S.game]||GAME_DATA.fishana;let idx=(S.round-1)%g.rounds.length;let row=g.rounds[idx];txt('title',g.icon+' '+g.name);txt('score','Round '+S.round+'/3 • Score '+S.score);html('prompt','<button class="btn camera">📷</button><div class="fx">'+g.scene+'</div><div class="miniTrack"><div class="car">'+S.face+'💨</div></div><div class="question"><b>'+row[0]+'</b></div><div class="joy">🕹️</div>');let box=$('answers');if(!box)return;box.innerHTML='';row[1].forEach((ans,i)=>{let b=document.createElement('button');b.className='btn choice';b.textContent=ans;b.onclick=function(){G.ans(20-i*3)};box.appendChild(b)})}async function pushScore(){if(S.room)await api('/rooms/'+S.room+'/players/'+S.id,'PATCH',me())}async function finalBoard(){await sync();S.players.sort((a,b)=>(b.score||0)-(a.score||0));html('board','<div class="fx">🎊🏆🎊</div>'+S.players.map((p,i)=>'<div class="box podium">'+(['🥇','🥈','🥉','🎖️'][i]||'⭐')+' '+p.avatar+' '+p.name+' '+(p.score||0)+'</div>').join(''))}return{show(id){showPage(id);if(id==='create')renderGames()},pick(k,v){S[k]=v;txt('avatarView',av())},pickJoin(k,v){J[k]=v;txt('joinAvatarView',jav())},async create(){S.name=$('name').value||S.name;S.game=$('gameSelect').value||S.game||'fishana';txt('online','writing Firebase...');S.room=await makeCode(S.game);let data={game:S.game,players:{[S.id]:me()},createdAt:Date.now()};await api('/rooms/'+S.room,'PUT',data);let ok=await waitRoom(S.room);S.players=ok?Object.values(ok.players):[me()];renderLobby();showPage('lobby');listen()},async join(){let c=$('joinCode').value.trim().toUpperCase();if(!c)return alert('enter code');S.name=$('joinName').value||S.name;S.face=J.face;S.body=J.body;S.acc=J.acc;let d=await waitRoom(c);if(!d)return alert('room not found');S.room=c;S.game=d.game||'fishana';await api('/rooms/'+c+'/players/'+S.id,'PUT',me());await sync();showPage('lobby');listen()},bot(){S.players.push({id:'bot'+Math.random(),name:'FishBot',avatar:'🐟🧊👑',score:0});renderLobby()},start(){S.round=1;showPage('play');setTimeout(runGame,50)},async ans(p){S.score+=p;await pushScore();S.round++;if(S.round>3){this.finish()}else{runGame()}},async finish(){await pushScore();await finalBoard();showPage('results')},copy(){navigator.clipboard&&navigator.clipboard.writeText(S.room);alert('copied '+S.room)},init(){Object.keys(GAME_DATA).forEach(k=>{let o=document.createElement('option');o.value=k;o.textContent=GAME_DATA[k].name;$('gameSelect').appendChild(o)});$('gameSelect').value=S.game;renderGames();txt('server','GameIO V2 ready')}}})();G.init();</script></body></html>
