<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GameIO Stable</title><style>:root{--bg:#07091f;--panel:#111a44;--cyan:#36e9ff;--pink:#ff3ca6;--yellow:#ffd84d;--green:#72ff91}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:white;font-family:monospace;font-weight:bold;overflow:hidden}.screen{display:none;position:fixed;inset:0;overflow:auto;padding:16px;background:radial-gradient(circle at 20% 0%,#17386f,transparent 35%),radial-gradient(circle at 90% 10%,#4a1543,transparent 35%),var(--bg)}.active{display:block}.card{max-width:920px;margin:24px auto;padding:20px;border:4px solid var(--cyan);border-radius:24px;background:rgba(17,26,68,.96);text-align:center;animation:pop .25s}.logo{font-size:70px;color:var(--pink);text-shadow:5px 5px #000;animation:pulse 1.4s infinite}.btn{padding:13px 16px;margin:7px;border:3px solid var(--cyan);border-radius:14px;background:var(--yellow);color:#061020;font:inherit;font-weight:bold;box-shadow:4px 4px #000;cursor:pointer}.btn:hover{transform:scale(1.04)}.pink{background:var(--pink);color:white}.blue{background:var(--cyan)}.green{background:var(--green)}.dark{background:#1b2762;color:white}.tile,.player{border:3px solid var(--cyan);border-radius:18px;background:#17245c;padding:14px;margin:8px;animation:bob 2.2s infinite}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px}.avatar{font-size:72px;margin:18px;animation:float 1.4s infinite}.code{font-size:56px;color:var(--yellow);letter-spacing:4px;animation:glow 1.5s infinite;user-select:all}input,select{padding:12px;border:3px solid var(--cyan);border-radius:12px;background:#060b22;color:white;font:inherit;margin:6px;max-width:420px;width:90%}.players{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin:14px 0}.arena{height:300px;border:4px dashed var(--cyan);border-radius:20px;background:#101b4b;position:relative;overflow:hidden;margin:12px 0}.dot{position:absolute;font-size:34px;transition:.22s;animation:float 1.2s infinite;text-align:center}.dot small{display:block;font-size:10px;color:var(--yellow)}.prompt{border:3px dashed var(--cyan);border-radius:16px;padding:13px;margin:12px;font-size:21px}.blast{position:absolute;font-size:42px;animation:boom .55s forwards}.win{box-shadow:0 0 25px var(--yellow);border-color:var(--yellow)}.toast{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);background:#000;border:2px solid var(--cyan);color:var(--yellow);border-radius:12px;padding:10px;display:none;z-index:99}.chatBtn{position:fixed;right:12px;bottom:12px;z-index:50}.chat{position:fixed;right:-350px;top:0;width:min(350px,92vw);height:100vh;background:#0d1438;border-left:4px solid var(--cyan);padding:12px;transition:.25s;z-index:45;display:flex;flex-direction:column}.chat.open{right:0}.msgs{flex:1;overflow:auto;border:2px solid var(--cyan);border-radius:12px;margin:8px 0;padding:8px;background:#07091f}.msg{background:#1b2762;margin:6px;padding:7px;border-radius:10px;text-align:left}.fakevid{height:110px;border:3px solid var(--green);border-radius:14px;display:grid;place-items:center;background:#050914;color:var(--green)}@keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1}}@keyframes pulse{50%{transform:scale(1.05)}}@keyframes bob{50%{transform:translateY(-7px)}}@keyframes float{50%{transform:translateY(-6px) rotate(-2deg)}}@keyframes glow{50%{text-shadow:0 0 22px var(--yellow)}}@keyframes boom{to{transform:scale(2);opacity:0}}</style></head><body><div id="toast" class="toast"></div><button class="btn pink chatBtn" onclick="Game.chat()">Chat+</button><div id="chat" class="chat"><h2>Chat+ 💬</h2><p><button class="btn blue" onclick="Game.flag('cam')">📹</button><button class="btn green" onclick="Game.flag('mic')">🎤</button><button class="btn" onclick="Game.emoji()">😀</button><button class="btn dark" onclick="Game.chat()">X</button></p><div id="fakevid" class="fakevid">📹 safe video emoji panel</div><div id="msgs" class="msgs"></div><input id="chatText" placeholder="type chat"><button class="btn green" onclick="Game.send()">Send</button></div><section id="home" class="screen active"><div class="card"><div class="logo">GAME IO</div><p id="server">checking Firebase...</p><button class="btn pink" onclick="Game.show('menu')">PRESS START</button></div></section><section id="menu" class="screen"><div class="card"><h1>Choose Portal</h1><div class="grid"><button class="tile" onclick="Game.quick()">J⚡ Quick Fishana</button><button class="tile" onclick="Game.show('avatar')">C⚡ Create</button><button class="tile" onclick="Game.show('join')">CJ Join</button></div></div></section><section id="avatar" class="screen"><div class="card"><h1>Build Avatar</h1><div id="avatarView" class="avatar">😎🧥⚡</div><input id="name" placeholder="Your name"><p><button class="btn" onclick="Game.pick('face','😎')">😎</button><button class="btn" onclick="Game.pick('face','🐟')">🐟</button><button class="btn" onclick="Game.pick('face','🦖')">🦖</button><button class="btn" onclick="Game.pick('face','🤖')">🤖</button></p><p><button class="btn" onclick="Game.pick('body','👕')">👕</button><button class="btn" onclick="Game.pick('body','🧥')">🧥</button><button class="btn" onclick="Game.pick('acc','👑')">👑</button><button class="btn" onclick="Game.pick('acc','🎧')">🎧</button></p><button class="btn green" onclick="Game.saveAvatar()">SAVE</button><button class="btn blue" onclick="Game.show('create')">NEXT</button></div></section><section id="create" class="screen"><div class="card"><h1>Create Room</h1><select id="gameSelect"></select><select id="rounds"><option>3</option><option selected>5</option><option>7</option></select><br><button class="btn pink" onclick="Game.create()">CREATE CODE</button><button class="btn dark" onclick="Game.show('menu')">BACK</button></div></section><section id="join" class="screen"><div class="card"><h1>Join Room</h1><input id="joinCode" placeholder="FISH-A7" style="text-transform:uppercase"><input id="joinName" placeholder="Your name"><br><button class="btn blue" onclick="Game.join()">JOIN</button><button class="btn dark" onclick="Game.show('menu')">BACK</button></div></section><section id="lobby" class="screen"><div class="card"><h1>Lobby</h1><div id="roomCode" class="code">----</div><p id="roomInfo"></p><div id="players" class="players"></div><button class="btn green" onclick="Game.start()">START GAME</button><button class="btn blue" onclick="Game.addBot()">ADD BOT</button><button class="btn pink" onclick="Game.chat()">Chat+</button></div></section><section id="play" class="screen"><div class="card"><h1 id="gameTitle"></h1><p id="roundScore"></p><div id="arena" class="arena"></div><div id="prompt" class="prompt"></div><div id="answers"></div><button class="btn dark" onclick="Game.finish()">FINISH</button></div></section><section id="results" class="screen"><div class="card"><h1>🏆 Winner Chart</h1><div id="board"></div><h2 id="slogan">CEO OF WINNING</h2><button class="btn green" onclick="Game.rematch()">REMATCH</button><button class="btn blue" onclick="Game.show('menu')">MENU</button></div></section><script>const Game=(()=>{const DB="https://gameio-7e343-default-rtdb.firebaseio.com";const games={fishana:"🎣 Fishana",npat:"📝 Name Place Animal Thing",charades:"🎭 Charades",cars:"🏎 Cars",badamsat:"🥜 Badamsat",bluff:"🃏 Bluff",funnyai:"😂 Funny AI",facetalk:"🗣 FaceTalk"};const prefixes={fishana:["FISH","FIN","BUB"],npat:["NPAT","WORD"],charades:["CHAR","ACT"],cars:["CAR","RACE"],badamsat:["BADM","SAT"],bluff:["BLUF","CARD"],funnyai:["LOL","MEME"],facetalk:["FACE","TALK"]};const prompts={fishana:[["TRIPLE FISHANA CHECK 1: Baby Fish found a lightning pearl!",["Bubble Blast","Tail Spin","Hide","Mega Swim"]],["TRIPLE FISHANA CHECK 2: Fishana evolves now!",["Electric Fin","Shell Shield","Octo Ink","Tiny Bite"]],["TRIPLE FISHANA CHECK 3: Shark King appears!",["Thunder Wave","Bubble Net","Fin Dash","Sing Song"]]],npat:[["Letter D: Name, Place, Animal, Thing",["Dhruv Delhi Dog Drum","Dino Dubai Deer Door","Skip","Fish answer"]]],charades:[["Act like a T-Rex in traffic",["Roar","Dance","Skip","Freeze"]]],cars:[["Green light!",["Turbo","Drift","Horn","Brake"]]],badamsat:[["Badamsat card move",["Safe card","Risk card","Pass","Bluff face"]]],bluff:[["Player says: three kings",["Believe","Call Bluff","Raise","Stare"]]],funnyai:[["Funny AI says: I am normal",["Roast it","Trust it","Ask joke","Run"]]],facetalk:[["Make a victory face",["😎 Cool","😂 Laugh","😭 Drama","🐟 Fish"]]]};const slogans=["TRIPLE FISHANA LEGEND","GAMEIO CHAMP","NO BUG FISH","CHAT+ WINNER","CODE KING"];let st={id:localStorage.gid||("p"+Math.random().toString(36).slice(2,8)),name:"Commander",face:"😎",body:"🧥",acc:"⚡",game:"fishana",rounds:5,round:1,score:0,room:"",players:[],cam:false,mic:false,x:50,y:50};localStorage.gid=st.id;const $=id=>document.getElementById(id);const rand=a=>a[Math.floor(Math.random()*a.length)];function show(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));$(id).classList.add("active")}function avatar(){return st.face+st.body+st.acc}function me(){return{id:st.id,name:st.name,avatar:avatar(),score:st.score,x:st.x,y:st.y,cam:st.cam,mic:st.mic}}function toast(t){$("toast").textContent=t;$("toast").style.display="block";clearTimeout(toast.t);toast.t=setTimeout(()=>$("toast").style.display="none",1600)}async function api(path,method="GET",data){try{let opt={method,headers:{"Content-Type":"application/json"}};if(data!==undefined)opt.body=JSON.stringify(data);let r=await fetch(DB+path+".json",opt);return r.ok?await r.json():null}catch(e){return null}}async function uniqueCode(game){const L="ABCDEFGHJKLMNPQRSTUVWXYZ",N="23456789";for(let i=0;i<25;i++){let c=rand(prefixes[game]||["GAME"])+"-"+rand(L)+rand(N);let exists=await api("/rooms/"+c);if(!exists)return c}return "GAME-"+Date.now().toString(36).slice(-3).toUpperCase()}function renderLobby(){$("roomCode").textContent=st.room||"----";$("roomInfo").textContent=(games[st.game]||st.game)+" • "+st.rounds+" rounds";$("players").innerHTML=st.players.map((p,i)=>`<div class="player ${i===0?'win':''}"><div style="font-size:30px">${p.avatar||"😎🧥⚡"}</div><div>${p.name||"Player"} ${p.cam?"📹":""}${p.mic?"🎤":""}</div><div>${p.score||0} pts</div></div>`).join("")}function renderArena(){$("arena").innerHTML="";st.players.forEach(p=>{let d=document.createElement("div");d.className="dot";d.style.left=(p.x||50)+"%";d.style.top=(p.y||50)+"%";d.innerHTML=(p.avatar||"😎")+"<small>"+(p.name||"P").slice(0,8)+"</small>";$("arena").appendChild(d)})}function renderGame(){let list=prompts[st.game]||prompts.fishana;let item=list[(st.round-1)%list.length];$("gameTitle").textContent=games[st.game]||st.game;$("roundScore").textContent="Round "+st.round+"/"+st.rounds+" • Score "+st.score;$("prompt").textContent=item[0];$("answers").innerHTML=item[1].map((x,i)=>`<button class="btn ${i?'blue':'pink'}" onclick="Game.answer(${20-i*3})">${x}</button>`).join("");renderArena()}function board(){st.players[0]=me();st.players.forEach((p,i)=>{if(i&&!p.score)p.score=Math.floor(20+Math.random()*100)});st.players.sort((a,b)=>(b.score||0)-(a.score||0));$("board").innerHTML=st.players.map((p,i)=>`<div class="player ${i===0?'win':''}">${["🥇","🥈","🥉","🎖️"][i]||"⭐"} ${p.avatar||""} ${p.name} — ${p.score||0}</div>`).join("");$("slogan").textContent=rand(slogans)}function init(){Object.entries(games).forEach(([k,v])=>{let o=document.createElement("option");o.value=k;o.textContent=v;$("gameSelect").appendChild(o)});api("/rooms").then(x=>$("server").textContent=x!==null?"Firebase reachable / local backup ready":"Preview may block Firebase / local backup ready")}return{show,pick(k,v){st[k]=v;$("avatarView").textContent=avatar()},saveAvatar(){st.name=$("name").value.trim()||"Commander";$("avatarView").textContent=avatar();toast("avatar saved")},async create(){st.name=$("name").value.trim()||st.name;st.game=$("gameSelect").value;st.rounds=Number($("rounds").value);st.round=1;st.score=0;st.room=await uniqueCode(st.game);st.x=20+Math.random()*60;st.y=20+Math.random()*55;st.players=[me()];renderLobby();show("lobby");toast("code "+st.room);api("/rooms/"+st.room,"PUT",{game:st.game,rounds:st.rounds,players:{[st.id]:me()}})},async quick(){st.game="fishana";st.rounds=3;st.round=1;st.score=0;st.room=await uniqueCode("fishana");st.players=[me()];renderLobby();show("lobby")},async join(){let c=$("joinCode").value.trim().toUpperCase();if(!c)return toast("enter code");let d=await api("/rooms/"+c);if(!d)return toast("room not found or preview blocked");st.name=$("joinName").value.trim()||st.name;st.room=c;st.game=d.game||"fishana";st.rounds=d.rounds||5;st.players=Object.values(d.players||{});st.players.push(me());renderLobby();show("lobby");api("/rooms/"+c+"/players/"+st.id,"PUT",me())},addBot(){st.players.push({id:"bot"+Math.random(),name:rand(["FishBot","DinoBot","BluffBot"]),avatar:rand(["🐟👕👑","🦖🧥🎧","🤖👕⚡"]),score:0,x:Math.random()*80,y:Math.random()*70});renderLobby()},start(){st.round=1;show("play");renderGame()},answer(points){st.score+=points+Math.floor(Math.random()*7);st.x=Math.max(2,Math.min(90,(st.x||50)+(Math.random()*25-12)));st.y=Math.max(2,Math.min(78,(st.y||50)+(Math.random()*25-12)));let b=document.createElement("div");b.className="blast";b.textContent="💥";b.style.left="45%";b.style.top="45%";$("arena").appendChild(b);setTimeout(()=>b.remove(),600);st.round++;if(st.round>st.rounds)this.finish();else renderGame()},finish(){board();show("results")},rematch(){st.round=1;st.score=0;renderLobby();show("lobby")},chat(){$("chat").classList.toggle("open")},emoji(){$("chatText").value+=" 😭⚡🐟 "},flag(k){st[k]=!st[k];$("fakevid").textContent=(st.cam?"📹 ":"")+(st.mic?"🎤 ":"")+"Chat+ safe emoji panel";renderLobby()},send(){let t=$("chatText").value.trim();if(!t)return;$("chatText").value="";$("msgs").innerHTML+=`<div class="msg"><b>${st.name}:</b> ${t}</div>`},init}})();Game.init();</script></body></html>
